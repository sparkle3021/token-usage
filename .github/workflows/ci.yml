name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go 后端检查（跨平台） ──────────────────────────────
  go-check:
    name: Go Vet & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (required for go:embed)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

  # ── 前端检查（跨平台） ──────────────────────────────────
  frontend-check:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: oxlint
        working-directory: frontend
        run: npx oxlint@latest

  # ── 桌面应用构建（仅 Windows） ──────────────────────────
  desktop-build:
    name: Wails Build (Windows)
    runs-on: windows-latest
    needs: [go-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Wails build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenUsage-windows
          path: build/bin/TokenUsage.exe
